<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр по математике</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
padding:20px;
}

.container{
background:white;
width:90%;
max-width:900px;
padding:35px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
animation:fadeIn 1s ease;
}

h1,h2{
text-align:center;
color:#1e293b;
margin-bottom:20px;
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#475569;
line-height:1.5;
}

input[type=text]{
width:100%;
padding:14px;
margin-bottom:15px;
border:2px solid #cbd5e1;
border-radius:12px;
font-size:16px;
}

.question{
background:#f8fafc;
padding:20px;
border-radius:15px;
margin-top:15px;
animation:slideUp .5s ease;
}

.question p{
margin-bottom:12px;
font-size:18px;
}

label{
display:block;
padding:10px;
margin:6px 0;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

label:hover{
background:#eef2ff;
}

.center{
text-align:center;
margin-top:20px;
}

button{
background:#4f46e5;
color:white;
border:none;
padding:14px 28px;
border-radius:12px;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#3730a3;
}

button:disabled{
background:#94a3b8;
cursor:not-allowed;
transform:none;
}

.hidden{
display:none;
}

.feedback{
margin-top:20px;
padding:15px;
border-radius:12px;
font-size:16px;
line-height:1.5;
animation:fadeIn .5s ease;
}

.correct{
background:#dcfce7;
color:#166534;
}

.incorrect{
background:#fee2e2;
color:#991b1b;
}

.score{
font-size:24px;
text-align:center;
margin:15px 0;
font-weight:bold;
}

.result-card{
background:#f8fafc;
padding:25px;
border-radius:15px;
margin-top:20px;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<!-- СТАРТ -->

<div id="startScreen">

<h1>📘 Интерактивный тренажёр</h1>

<div class="subtitle">
Тема: <b>Нелинейные уравнения с двумя переменными и их системы</b><br>
Цель: распознавать системы, решаемые способом введения новой переменной.
</div>

<input type="text" id="surname" placeholder="Введите фамилию">
<input type="text" id="name" placeholder="Введите имя">

<div class="center">
<button onclick="startQuiz()">Начать работу</button>
</div>

</div>

<!-- ТЕСТ -->

<div id="quizScreen" class="hidden">

<h2>Выполните задания</h2>

<div id="questionContainer"></div>

<div class="center">
<button id="checkBtn" onclick="checkAnswer()">Проверить</button>
</div>

<div id="feedback"></div>

<div class="center">
<button id="nextBtn" onclick="nextQuestion()" style="display:none;">
Следующее задание →
</button>
</div>

</div>

<!-- РЕЗУЛЬТАТ -->

<div id="resultScreen" class="hidden">

<h2>🏆 Результаты</h2>

<div class="result-card">

<div class="score" id="studentInfo"></div>

<div class="score" id="correctAnswers"></div>

<div class="score" id="finalMark"></div>

</div>

<div class="center">
<button onclick="location.reload()">Пройти ещё раз</button>
</div>

</div>

</div>

<script>

const questions = [

{
question:"Какая система удобно решается способом введения новой переменной?",
answers:[
"x + y = 7, x² + y² = 25",
"x + y = 5, 2x − y = 1",
"3x + y = 8, x − y = 2"
],
correct:0,
explanation:"Верно. В системе присутствуют выражения x+y и x²+y², что позволяет использовать формулу x²+y²=(x+y)²−2xy."
},

{
question:"В системе x+y=9 и x²+y²=41 какое выражение удобно принять за новую переменную?",
answers:[
"t = x + y",
"t = x − y",
"t = xy²"
],
correct:0,
explanation:"Выражение x+y уже известно из первого уравнения и позволяет найти произведение xy."
},

{
question:"Какая формула используется при решении систем вида x+y=a и x²+y²=b?",
answers:[
"x²+y²=(x+y)²−2xy",
"x²+y²=(x−y)²−2xy",
"x²+y²=(x+y)²+2xy"
],
correct:0,
explanation:"Именно эта формула связывает сумму и произведение корней."
},

{
question:"Какая система НЕ требует введения новой переменной?",
answers:[
"x+y=11, x²+y²=61",
"2x+y=8, x−y=1",
"xy=24, x²+y²=73"
],
correct:1,
explanation:"Это линейная система. Её рационально решать способом сложения или подстановки."
},

{
question:"В системе xy=24 и x²+y²=73 удобно сначала найти:",
answers:[
"x+y",
"x−y",
"x²−y²"
],
correct:0,
explanation:"Используется формула (x+y)²=x²+y²+2xy."
},

{
question:"Для чего применяется введение новой переменной?",
answers:[
"Для упрощения системы",
"Для увеличения количества переменных",
"Для построения графиков"
],
correct:0,
explanation:"Введение новой переменной позволяет свести задачу к более простой."
}

];

let currentQuestion = 0;
let score = 0;

function startQuiz(){

const surname=document.getElementById("surname").value.trim();
const name=document.getElementById("name").value.trim();

if(surname==="" || name===""){
alert("Введите фамилию и имя.");
return;
}

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");

showQuestion();
}

function showQuestion(){

const q = questions[currentQuestion];

document.getElementById("questionContainer").innerHTML=`

<div class="question">

<p><b>Задание ${currentQuestion+1} из ${questions.length}</b></p>

<p>${q.question}</p>

${q.answers.map((answer,index)=>`

<label>
<input type="radio" name="answer" value="${index}">
${answer}
</label>

`).join("")}

</div>
`;

document.getElementById("feedback").innerHTML="";
document.getElementById("nextBtn").style.display="none";
document.getElementById("checkBtn").disabled=false;
}

function checkAnswer(){

const selected=document.querySelector('input[name="answer"]:checked');

if(!selected){
alert("Выберите ответ.");
return;
}

const answer=parseInt(selected.value);
const q=questions[currentQuestion];

if(answer===q.correct){

score++;

document.getElementById("feedback").innerHTML=`
<div class="feedback correct">
✅ <b>Правильно!</b><br><br>
${q.explanation}
</div>
`;

}else{

document.getElementById("feedback").innerHTML=`
<div class="feedback incorrect">
❌ <b>Неправильно.</b><br><br>
${q.explanation}
</div>
`;
}

document.getElementById("checkBtn").disabled=true;
document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < questions.length){

showQuestion();

}else{

showResults();

}
}

function showResults(){

document.getElementById("quizScreen").classList.add("hidden");
document.getElementById("resultScreen").classList.remove("hidden");

const surname=document.getElementById("surname").value;
const name=document.getElementById("name").value;

document.getElementById("studentInfo").innerHTML=
`Ученик: <b>${surname} ${name}</b>`;

document.getElementById("correctAnswers").innerHTML=
`Правильных ответов: ${score} из ${questions.length}`;

const percent=Math.round(score/questions.length*100);

document.getElementById("finalMark").innerHTML=
`Итоговый результат: <b>${percent}%</b>`;
}

</script>

</body>
</html>
